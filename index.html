<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IgoRacks</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="noise"></div>

<header id="top">

    <a href="#top" class="logo">
        IgoRacks
    </a>

    <p class="subtitle">
        Hip-Hop Producer · Artist · Mix Engineer
    </p>

    <div class="socials">

        <a href="https://open.spotify.com/artist/74ZzK035XeXN4eh4vNsLd8?si=PR6vhwCAR2qcg_WGzQOjGQ" target="_blank">
            <i class="fab fa-spotify"></i>
        </a>

        <a href="https://www.youtube.com/@igoracksbeats" target="_blank">
            <i class="fab fa-youtube"></i>
        </a>

        <a href="https://instagram.com/igoracksbeats" target="_blank">
            <i class="fab fa-instagram"></i>
        </a>

        <a href="https://t.me/igoracks" target="_blank">
            <i class="fab fa-telegram"></i>
        </a>

        <a href="https://wa.me/79996351902?text=Let's work!" target="_blank">
            <i class="fab fa-whatsapp"></i>
        </a>

    </div>

</header>

<section class="beats">

    <div class="beat">

        <div class="beat-info">

            <div>

                <h2>GOAT BELL</h2>

                <span>143 BPM • C Minor</span>

            </div>

            <button class="play-btn">

                <i class="fas fa-play"></i>

            </button>

        </div>

        <input class="progress" type="range" value="0" min="0" max="100">

        <div class="time">

            <span class="current">0:00</span>

            <span class="duration">0:00</span>

        </div>

        <audio src="audio/goat-bell.mp3"></audio>

    </div>



    <div class="beat">

        <div class="beat-info">

            <div>

                <h2>NIGHTMARE</h2>

                <span>148 BPM • A Minor</span>

            </div>

            <button class="play-btn">

                <i class="fas fa-play"></i>

            </button>

        </div>

        <input class="progress" type="range" value="0" min="0" max="100">

        <div class="time">

            <span class="current">0:00</span>

            <span class="duration">0:00</span>

        </div>

        <audio src="audio/nightmare.mp3"></audio>

    </div>



    <div class="beat">

        <div class="beat-info">

            <div>

                <h2>PEW</h2>

                <span>150 BPM • F# Minor</span>

            </div>

            <button class="play-btn">

                <i class="fas fa-play"></i>

            </button>

        </div>

        <input class="progress" type="range" value="0" min="0" max="100">

        <div class="time">

            <span class="current">0:00</span>

            <span class="duration">0:00</span>

        </div>

        <audio src="audio/pew.mp3"></audio>

    </div>

</section>

<footer>

    <a href="#top">

        © IgoRacks 2026

    </a>

</footer>

<script src="script.js"></script>

</body>
</html>

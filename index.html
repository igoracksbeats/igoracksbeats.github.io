<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IgoRacks Beats</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>


<body>


<div class="noise"></div>


<header id="top">


<a href="#top" class="logo">
IgoRacks
</a>


<p class="subtitle">
Hip-Hop Producer · Artist · Mix Engineer
</p>


<div class="socials">


<a href="https://open.spotify.com/artist/74ZzK035XeXN4eh4vNsLd8?si=PR6vhwCAR2qcg_WGzQOjGQ">
<i class="fab fa-spotify"></i>
</a>


<a href="https://www.youtube.com/@igoracksbeats">
<i class="fab fa-youtube"></i>
</a>


<a href="https://instagram.com/igoracksbeats">
<i class="fab fa-instagram"></i>
</a>


<a href="https://t.me/igoracks">
<i class="fab fa-telegram"></i>
</a>


<a href="https://wa.me/79996351902?text=Let's work!">
<i class="fab fa-whatsapp"></i>
</a>


</div>


</header>





<section class="beats">


<div class="beat"
data-title="Undeterred"
data-info="136 BPM • C Minor"
data-src="audio/undeterred.mp3">


<div class="beat-info">


<div>

<h2>UNDeterred</h2>

<span>
136 BPM • C Minor
</span>

</div>


<button class="play-btn">

<i class="fas fa-play"></i>

</button>


</div>


</div>



</section>







<div class="player">


<div class="player-title">


<span id="current-title">
Select beat
</span>


<span id="current-info">
</span>


</div>



<div class="controls">


<button id="prev">
<i class="fas fa-backward"></i>
</button>


<button id="main-play">

<i class="fas fa-play"></i>

</button>


<button id="next">

<i class="fas fa-forward"></i>

</button>


</div>





<div class="timeline">


<span id="time-current">
0:00
</span>


<input id="seek"
type="range"
min="0"
max="100"
value="0">


<span id="time-total">
0:00
</span>


</div>




<div class="volume">


<i class="fas fa-volume-high"></i>


<input id="volume"
type="range"
min="0"
max="1"
step="0.01"
value="0.8">


</div>



</div>



<audio id="audio"></audio>






<footer>

<a href="#top">

© IgoRacks 2026

</a>

</footer>




<script src="script.js"></script>


</body>

</html>
